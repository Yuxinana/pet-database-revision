services:
  - type: web
    name: pawtrack
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      npm install --prefix frontend
      npm --prefix frontend run build
    startCommand: bash -c 'uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-10000}'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
